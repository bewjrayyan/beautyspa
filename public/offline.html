<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f6f5f8;
            color: #0e1e3e;
        }
        .box {
            text-align: center;
            padding: 2rem;
        }
        button {
            margin-top: 1rem;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            background: #0068e0;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>No internet connection</h1>
        <p>Please check your connection and try again.</p>
        <button type="button" onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
